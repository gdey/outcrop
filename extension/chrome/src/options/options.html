<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Outcrop Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Outcrop</h1>
      <p class="lede">
        Local server settings. The token is generated by
        <code>outcrop init</code> on the server side.
      </p>

      <form id="form" autocomplete="off">
        <label>
          <span>Server URL</span>
          <input
            id="serverURL"
            type="url"
            required
            placeholder="http://127.0.0.1:7878"
          />
        </label>

        <label>
          <span>Token</span>
          <input
            id="token"
            type="password"
            required
            spellcheck="false"
            autocapitalize="off"
          />
        </label>

        <div class="actions">
          <button type="button" id="test">Test connection</button>
          <button type="submit" id="save">Save</button>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
