# GoReleaser config for outcrop. https://goreleaser.com
#
# Local dry-run:
#   goreleaser release --snapshot --clean --skip=publish
#
# Real release (after `git tag vX.Y.Z && git push --tags`, on a CI runner with
# a GITHUB_TOKEN):
#   goreleaser release --clean
version: 2

project_name: outcrop

before:
  hooks:
    - go mod tidy

builds:
  - id: outcrop
    main: ./cmd/outcrop
    binary: outcrop
    env:
      # outcrop is a pure-Go build by design (RFD 0003: no cgo). kronk's
      # llama.cpp binding (yzma) loads libllama at runtime via libffi, so
      # cross-compilation works without a C toolchain on the build host.
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows-on-arm64 is a niche; skip it until someone asks.
      - goos: windows
        goarch: arm64

archives:
  - id: outcrop
    name_template: "outcrop_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - PRIVACY.md
      - README.md
      - docs/install.md
      - docs/rfd/0001-architecture-overview.md
      - docs/rfd/0003-v1-server.md
      - docs/rfd/0005-local-llm-vault-recommendation.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other changes
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: gdey
    name: outcrop
  draft: true
  prerelease: auto
  name_template: "outcrop {{.Version}}"
  header: |
    ## outcrop {{.Version}}

    See [PRIVACY.md](PRIVACY.md) for the data-handling story and
    [docs/install.md](docs/install.md) for per-OS install instructions.
  footer: |
    ---

    Verify the download with the published `checksums.txt`:

    ```
    sha256sum -c checksums.txt
    ```
