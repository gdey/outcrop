name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (vet + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go vet ./...
      - run: go test ./...
      - run: go build ./cmd/outcrop

  extension:
    name: Firefox extension (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/firefox/package-lock.json

      - working-directory: extension/firefox
        run: |
          npm ci
          npm run check
          npm run build
