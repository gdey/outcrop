name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Per-platform native builds. CGO-on (-tags=tray pulls in fyne-io/systray
  # and fyne, which require Cocoa / GTK+AppIndicator native bindings). Each
  # job builds for its own runner's GOOS; cross-arch within the OS is fine
  # (clang -arch on macOS, gcc-aarch64-linux-gnu on Linux when needed).
  #
  # Windows is intentionally not in the matrix — see RFD 0014 §3.
  server:
    name: Server (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang -arch x86_64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            cc: gcc
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux native deps (GTK + AppIndicator + GL + xorg)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            xorg-dev

      - name: Build outcrop ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT_DATE="$(git log -1 --format=%cI)"
          DIR="outcrop_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "$DIR"
          go build \
            -tags tray \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${VERSION} \
              -X main.commit=${GITHUB_SHA} \
              -X main.date=${COMMIT_DATE}" \
            -o "$DIR/outcrop" \
            ./cmd/outcrop
          cp LICENSE PRIVACY.md README.md "$DIR/"
          mkdir -p "$DIR/docs"
          cp docs/install.md "$DIR/docs/"
          mkdir -p "$DIR/docs/rfd"
          cp docs/rfd/0001-architecture-overview.md \
             docs/rfd/0003-v1-server.md \
             docs/rfd/0005-local-llm-vault-recommendation.md \
             docs/rfd/0014-tray-applet.md \
             "$DIR/docs/rfd/"
          tar czf "$DIR.tar.gz" "$DIR"
          shasum -a 256 "$DIR.tar.gz" > "$DIR.tar.gz.sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            outcrop_*.tar.gz
            outcrop_*.tar.gz.sha256

  firefox:
    name: Firefox extension
    runs-on: ubuntu-latest
    env:
      # web-ext reads these env var names natively when --api-key/--api-secret
      # are omitted. Empty strings short-circuit the sign step below.
      WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
      WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/firefox/package-lock.json

      - name: Install dependencies
        working-directory: extension/firefox
        run: npm ci

      - name: Build extension
        working-directory: extension/firefox
        run: npm run package

      - name: Upload unsigned .zip as workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: firefox-unsigned
          path: extension/firefox/dist-artifacts/*.zip

      - name: Sign extension (Mozilla AMO, unlisted channel)
        if: env.WEB_EXT_API_KEY != ''
        working-directory: extension/firefox
        run: npm run sign

      - name: Attach signed .xpi to release
        if: env.WEB_EXT_API_KEY != ''
        uses: softprops/action-gh-release@v3
        with:
          files: extension/firefox/dist-artifacts/*.xpi
          tag_name: ${{ github.ref_name }}
          draft: true

  chrome:
    name: Chrome extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/chrome/package-lock.json

      - name: Install dependencies
        working-directory: extension/chrome
        run: npm ci

      - name: Build extension
        working-directory: extension/chrome
        run: npm run package

      - name: Attach .zip to release
        uses: softprops/action-gh-release@v3
        with:
          files: extension/chrome/dist-artifacts/*.zip
          tag_name: ${{ github.ref_name }}
          draft: true
